services:
  game-server:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8080
      - FIRESTORE_PROJECT_ID=gwiezdny-kupiec-dev
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    depends_on:
      - redis
      - firestore-emulator

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  firestore-emulator:
    image: mtlynch/firestore-emulator
    ports:
      - "8080:8080"
    environment:
      - FIRESTORE_PROJECT_ID=gwiezdny-kupiec-dev

  game-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_BACKEND_URL=http://localhost:3000
    depends_on:
      - game-server
